name: Continuous Development

on:
  push:
    branches:
      - update-build-and-deploy-ci-cd
    paths-ignore:
      - 'infrastructure/**'
      - 'docs/**'
      - 'README.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: superguitartab.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build proxy image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t superguitartab.azurecr.io/app:proxy-latest \
            --push \
            ./proxy/production

      - name: Build client image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t superguitartab.azurecr.io/app:client-latest \
            --push \
            ./client

      - name: Build API image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t superguitartab.azurecr.io/app:tabs-api-latest \
            --push \
            ./tabs-api

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-boto3 sshpass

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.AZURE_VM_SSH_KEY }}

      - name: Add VM to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ansible-playbook \
            -i ./infrastructure/ansible/hosts.ini \
            ./infrastructure/ansible/playbooks/deploy.yml \
            -e "acr_username=${{ secrets.AZURE_ACR_USERNAME }}" \
            -e "acr_password=${{ secrets.AZURE_ACR_PASSWORD }}"