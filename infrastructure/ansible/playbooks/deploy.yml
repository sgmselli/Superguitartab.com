---
- name: pull images from registry and run docker compose
  hosts: vm01
  become: yes
  tasks:
    - name: Ensure project directory exists
      file:
        path: /home/mattsellings
        state: directory
        mode: '0755'

    - name: Copy docker-compose file
      copy:
        src: ../../../compose/docker-compose.production.yml
        dest: /home/mattsellings/docker-compose.production.yml
    
    - name: Log in to Azure Container Registry
      community.docker.docker_login:
        registry_url: superguitartab.azurecr.io
        username: "{{ acr_username }}"
        password: "{{ acr_password }}"

    - name: Pull and start containers
      community.docker.docker_compose_v2:
        project_src: /home/mattsellings
        files:
          - docker-compose.production.yml
        pull: always
        state: present